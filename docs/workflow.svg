iberation Mono',monospace" font-weight="400" text-anchor="start">the next plan/apply</text><line x1="304" y1="300.0" x2="337" y2="300.0" stroke="#2dd4bf" stroke-width="2.2"/><path d="M 344 300.0 l -9 -5 l 0 10 z" fill="#2dd4bf"/><line x1="608" y1="300.0" x2="641" y2="300.0" stroke="#2dd4bf" stroke-width="2.2"/><path d="M 648 300.0 l -9 -5 l 0 10 z" fill="#2dd4bf"/><line x1="912" y1="300.0" x2="945" y2="300.0" stroke="#2dd4bf" stroke-width="2.2"/><path d="M 952 300.0 l -9 -5 l 0 10 z" fill="#2dd4bf"/><path d="M 1082.0 490 L 1082.0 480 L 476.0 480 L 476.0 410" fill="none" stroke="#e3b341" stroke-width="1.8" stroke-dasharray="2,5" opacity="0.75"/><path d="M 476.0 410 l -7 -10 l 14 0 z" fill="#e3b341"/><text x="779.0" y="502" font-size="12" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle" letter-spacing="0.5">caught on the next terraform plan</text></svg>