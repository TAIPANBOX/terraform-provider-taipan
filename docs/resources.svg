Brains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">NONE TODAY</text><line x1="944" y1="394" x2="1226" y2="394" stroke="#222b38" stroke-width="1"/><text x="944" y="418" font-size="13" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">Provider.DataSources() = []</text><text x="944" y="442" font-size="12" fill="#69788b" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">read state back via terraform state / refresh</text></svg>